<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Solana - Nostalgie</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        canvas { border: 4px solid #3b82f6; background: #000; touch-action: none; }
        body { background: #0f172a; color: white; overflow: hidden; }
    </style>
</head>
<body class="flex flex-col items-center p-4">
    <h1 class="text-2xl font-black text-blue-400 mb-2">SNAKE SOLANA</h1>
    
    <div id="status" class="text-xs mb-4 text-blue-300 font-mono text-center">Connecte ton wallet pour jouer</div>
    <button id="connectBtn" class="bg-blue-600 px-6 py-2 rounded-full font-bold mb-4 shadow-lg shadow-blue-900">Connecter Phantom</button>

    <canvas id="gameCanvas" width="300" height="300" class="rounded-lg"></canvas>

    <div id="scoreDisplay" class="mt-4 text-xl font-bold">Score: 0</div>

    <div id="gameOverArea" class="hidden fixed inset-0 bg-black/80 flex flex-col items-center justify-center p-6 text-center">
        <h2 class="text-4xl font-black text-red-500 mb-2">GAME OVER</h2>
        <p id="finalScore" class="text-xl mb-6 font-bold"></p>
        
        <button id="reviveBtn" class="bg-green-500 w-full py-4 rounded-xl font-black text-lg mb-4 shadow-lg shadow-green-900">
            CONTINUER (0.005 SOL)
        </button>
        
        <button id="shareBtn" class="bg-purple-600 w-full py-3 rounded-xl font-bold mb-4">
            PARTAGER SUR FARCASTER
        </button>

        <button onclick="location.reload()" class="text-gray-400 underline">Recommencer à zéro</button>
    </div>

    <script>
        const DEST_WALLET = "GU5dNvMQKoUiVJvZ5HUgrv3CxtrR5ujxfHK2HPT6Z6bV";
        const REVIVE_COST = 0.005;
        const PRIORITY_FEE = 0.001; // Tes réglages personnels

        let walletAddress = null;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0, dy = 0, score = 0, gameInterval;

        // Connexion Wallet
        document.getElementById('connectBtn').onclick = async () => {
            if (window.solana) {
                try {
                    const resp = await window.solana.connect();
                    walletAddress = resp.publicKey.toString();
                    document.getElementById('status').innerText = "Wallet: " + walletAddress.slice(0,6) + "...";
                    document.getElementById('connectBtn').classList.add('hidden');
                    startGame();
                } catch (e) { alert("Erreur de connexion"); }
            } else { alert("Utilise le navigateur de Phantom !"); }
        };

        // Paiement Revive
        document.getElementById('reviveBtn').onclick = async () => {
            const connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com");
            const transaction = new solanaWeb3.Transaction().add(
                solanaWeb3.SystemProgram.transfer({
                    fromPubkey: window.solana.publicKey,
                    toPubkey: new solanaWeb3.PublicKey(DEST_WALLET),
                    lamports: (REVIVE_COST + PRIORITY_FEE) * solanaWeb3.LAMPORTS_PER_SOL,
                })
            );
            try {
                const { signature } = await window.solana.signAndSendTransaction(transaction);
                document.getElementById('status').innerText = "Vérification...";
                await connection.confirmTransaction(signature);
                document.getElementById('gameOverArea').classList.add('hidden');
                dx = 0; dy = 0; // On reprend
            } catch (err) { alert("Transaction annulée"); }
        };

        // Partage Farcaster
        document.getElementById('shareBtn').onclick = () => {
            const text = encodeURIComponent(`Je viens de faire ${score} au Snake Solana ! 🐍 Qui peut me battre ?`);
            window.open(`https://warpcast.com/~/compose?text=${text}`);
        };

        // Commandes tactiles (Swipe)
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; });
        canvas.addEventListener('touchend', e => {
            const diffX = e.changedTouches[0].clientX - touchStartX;
            const diffY = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0 && dx === 0) { dx = 1; dy = 0; } else if (dx === 0) { dx = -1; dy = 0; }
            } else {
                if (diffY > 0 && dy === 0) { dx = 0; dy = 1; } else if (dy === 0) { dx = 0; dy = -1; }
            }
        });

        function startGame() {
            gameInterval = setInterval(() => {
                const head = {x: snake[0].x + dx, y: snake[0].y + dy};
                if (dx === 0 && dy === 0) return;
                snake.unshift(head);
                if (head.x === food.x && head.y === food.y) {
                    score += 10;
                    document.getElementById('scoreDisplay').innerText = "Score: " + score;
                    food = {x: Math.floor(Math.random()*30), y: Math.floor(Math.random()*30)};
                } else { snake.pop(); }
                if (head.x<0 || head.x>=30 || head.y<0 || head.y>=30) {
                    document.getElementById('gameOverArea').classList.remove('hidden');
                    document.getElementById('finalScore').innerText = "Ton score: " + score;
                }
                ctx.fillStyle = "#000"; ctx.fillRect(0,0,300,300);
                ctx.fillStyle = "#22c55e"; snake.forEach(p => ctx.fillRect(p.x*10, p.y*10, 9, 9));
                ctx.fillStyle = "#ef4444"; ctx.fillRect(food.x*10, food.y*10, 9, 9);
            }, 100);
        }
    </script>
</body>
</html>
