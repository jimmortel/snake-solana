async function saveScore(username, score) {
    await fetch(`${SUPABASE_URL}/rest/v1/leaderboard`, {
        method: 'POST',
        headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'

}

    <style>

<body>

</div>

    <script>
        const DESTINATION_WALLET = "GU5dNTo6v2x5oCHZ6jY8RscGZt6xN8NExyMhWwP6bV";
        
        function checkStreak() {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            const lastVisitStr = localStorage.getItem('eagleLastVisit');
            let streak = parseInt(localStorage.getItem('eagleStreak')) || 0;

            if (lastVisitStr) {
                const lastVisit = parseInt(lastVisitStr);
                const diffDays = (today - lastVisit) / (1000 * 60 * 60 * 24);

                if (diffDays === 1) {
                    streak++; // Hier il est venu, aujourd'hui aussi = +1
                } else if (diffDays > 1) {
                    // Trop tard ! Streak gris car perdu
                    document.getElementById('freezeBtn').style.display = 'block';
                    document.getElementById('streakIcon').style.filter = 'grayscale(100%)';
                }
            } else {
                streak = 1; // Première visite
            }

            localStorage.setItem('eagleStreak', streak);
            localStorage.setItem('eagleLastVisit', today);
            document.getElementById('streakText').innerText = `SÉRIE : ${streak} JOURS`;
        }

        async function buyFreeze() {
            if (!window.solana) return alert("Connecte ton wallet !");
            try {
                const resp = await window.solana.connect();
                const connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com");
                
                const transaction = new solanaWeb3.Transaction().add(
                    solanaWeb3.SystemProgram.transfer({
                        fromPubkey: resp.publicKey,
                        toPubkey: new solanaWeb3.PublicKey(DESTINATION_WALLET),
                        lamports: 0.005 * solanaWeb3.LAMPORTS_PER_SOL,
                    })
                );

                // Réglage Priorité 0.001 SOL
                const priorityFee = solanaWeb3.ComputeBudgetProgram.setComputeUnitPrice({ microLamports: 1000000 });
                transaction.add(priorityFee);

                const { signature } = await window.solana.signAndSendTransaction(transaction);
                alert("Streak Sauvé ! 🔥");
                saveScore('jimmortel', parseInt(localStorage.getItem('eagle-streak') || 0));
                localStorage.setItem('eagleStreak', (parseInt(localStorage.getItem('eagleStreak')) || 0) + 1);
                location.reload();
            } catch (err) { alert("Erreur ou transaction annulée."); }
        }

        checkStreak();
                async function refreshLeaderboard() {
            const listElement = document.getElementById('leaderboard-list');
            if (!listElement) return;

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/leaderboard?select=*&order=score.desc&limit=10`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                const data = await response.json();

                if (data && data.length > 0) {
                    listElement.innerHTML = data.map(item => `
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1);">
                            <div style="display: flex; flex-direction: column;">
                                <span style="color: #00f2fe; font-weight: bold;">${item.username || 'Anonyme'}</span>
                                <span style="color: rgba(255,255,255,0.5); font-size: 0.8em; text-transform: uppercase;">🎮 ${item.game_name || 'Arcade'}</span>
                            </div>
                            <span style="color: #4facfe; font-weight: bold; font-size: 1.2em;">${item.score}</span>
                        </div>
                    `).join('');
                } else {
                    listElement.innerHTML = "<div style='text-align:center;color:gray;'>Aucun score enregistré</div>";
                }
            } catch (e) {
                listElement.innerHTML = "<div style='text-align:center;color:red;'>Erreur de chargement</div>";
            }
        }

        // Lancement unique
        window.onload = refreshLeaderboard;
    </script>
