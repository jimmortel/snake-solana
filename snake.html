<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle Snake 🦅🐍</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/index.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="access.js"></script>
    
    <style>
        body { background: #1a1a1a; color: #4ade80; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; touch-action: none; }
        canvas { border: 4px solid #4ade80; box-shadow: 0 0 20px rgba(74, 222, 128, 0.3); background-color: #000; }
        .header { position: absolute; top: 20px; text-align: center; width: 100%; }
        .score-board { font-size: 1.5rem; margin-bottom: 10px; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .btn { background: rgba(74, 222, 128, 0.1); border: 2px solid #4ade80; color: #4ade80; padding: 20px; border-radius: 10px; text-align: center; font-weight: bold; user-select: none; }
        .btn:active { background: #4ade80; color: #000; }
        #up { grid-column: 2; } #left { grid-column: 1; } #down { grid-column: 2; } #right { grid-column: 3; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 50; display: flex; align-items: center; justify-content: center; }
        #start-btn { background: #4ade80; color: black; font-weight: 900; padding: 20px 40px; border-radius: 15px; border: none; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn" onclick="handleEagleStart()">Lancer Snake (10 $TALON) 🦅</button>
    </div>

    <div class="header">
        <div class="score-board">SCORE: <span id="current-score">0</span></div>
    </div>

    <canvas id="snakeGame" width="300" height="300"></canvas>

    <div class="controls">
        <div id="up" class="btn">↑</div>
        <div id="left" class="btn">←</div>
        <div id="down" class="btn">↓</div>
        <div id="right" class="btn">→</div>
    </div>
