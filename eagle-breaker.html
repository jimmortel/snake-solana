<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle-Breaker 🦅</title>
    <style>
        body { background: #1a1a1a; color: #fff; text-align: center; font-family: 'Courier New', Courier, monospace; overflow: hidden; margin: 0; }
        canvas { background: #000; display: block; margin: 20px auto; border: 4px solid #333; box-shadow: 0 0 20px rgba(140, 1, 255, 0.3); touch-action: none; }
        .stats { font-size: 1.2rem; margin: 10px; color: #00ff00; }
        #pay-button { display: none; background: #8c01ff; color: white; border: none; padding: 15px 30px; font-size: 1.2rem; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 20px auto; }
    </style>
</head>
<body>
    <h1>EAGLE-BREAKER</h1>
    <div class="stats">Niveau: <span id="level">1</span> | Score: <span id="score">0</span></div>
    
    <canvas id="gameCanvas"></canvas>
    
    <button id="pay-button" onclick="handleRevive()">REVIVE (0.005 SOL)</button>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const levelEl = document.getElementById("level");
const payBtn = document.getElementById("pay-button");

canvas.width = window.innerWidth * 0.9;
canvas.height = window.innerHeight * 0.5;

let score = 0, level = 1, ballRadius = 8, x = canvas.width / 2, y = canvas.height - 30;
let dx = 3, dy = -3, paddleHeight = 15, paddleWidth = 80, paddleX = (canvas.width - paddleWidth) / 2;
let bricks = [];
let brickRowCount = 3, brickColumnCount = 5;
let brickWidth = (canvas.width / 5) - 10, brickHeight = 20, brickPadding = 5, brickOffsetTop = 30, brickOffsetLeft = 10;

function initBricks() {
    bricks = [];
    for(let c=0; c<brickColumnCount; c++) {
        bricks[c] = [];
        for(let r=0; r<brickRowCount; r++) {
            bricks[c][r] = { x: 0, y: 0, status: 1, special: Math.random() > 0.9 };
        }
    }
}

canvas.addEventListener("touchmove", (e) => {
    let touchX = e.touches[0].clientX - canvas.offsetLeft;
    if(touchX > 0 && touchX < canvas.width) paddleX = touchX - paddleWidth / 2;
}, false);

function drawBall() {
    ctx.beginPath(); ctx.arc(x, y, ballRadius, 0, Math.PI*2);
    ctx.fillStyle = "#00ff00"; ctx.fill(); ctx.closePath();
}

function drawPaddle() {
    ctx.beginPath(); ctx.rect(paddleX, canvas.height - paddleHeight, paddleWidth, paddleHeight);
    ctx.fillStyle = "#8c01ff"; ctx.fill(); ctx.closePath();
}

function drawBricks() {
    for(let c=0; c<brickColumnCount; c++) {
        for(let r=0; r<brickRowCount; r++) {
            if(bricks[c][r].status == 1) {
                let brickX = (c*(brickWidth+brickPadding))+brickOffsetLeft;
                let brickY = (r*(brickHeight+brickPadding))+brickOffsetTop;
                bricks[c][r].x = brickX; bricks[c][r].y = brickY;
                ctx.beginPath(); ctx.rect(brickX, brickY, brickWidth, brickHeight);
                ctx.fillStyle = bricks[c][r].special ? "#FFD700" : "#0095DD";
                ctx.fill(); ctx.closePath();
            }
        }
    }
}

function collisionDetection() {
    let activeBricks = 0;
    for(let c=0; c<brickColumnCount; c++) {
        for(let r=0; r<brickRowCount; r++) {
            let b = bricks[c][r];
            if(b.status == 1) {
                activeBricks++;
                if(x > b.x && x < b.x+brickWidth && y > b.y && y < b.y+brickHeight) {
                    dy = -dy; b.status = 0;
                    score += b.special ? 50 : 10;
                    scoreEl.innerText = score;
                }
            }
        }
    }
    if(activeBricks === 0) {
        level++; levelEl.innerText = level;
        dx *= 1.1; dy *= 1.1; x = canvas.width/2; y = canvas.height-30;
        initBricks();
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBricks(); drawBall(); drawPaddle(); collisionDetection();
    if(x + dx > canvas.width-ballRadius || x + dx < ballRadius) dx = -dx;
    if(y + dy < ballRadius) dy = -dy;
    else if(y + dy > canvas.height-ballRadius) {
        if(x > paddleX && x < paddleX + paddleWidth) dy = -dy;
        else { gameOver(); return; }
    }
    x += dx; y += dy;
    requestAnimationFrame(draw);
}

function gameOver() {
    payBtn.style.display = "block";
    alert("Game Over ! Niveau " + level);
}

function handleRevive() {
    alert("Connexion Wallet bientôt active...");
    payBtn.style.display = "none";
    y = canvas.height - 30; dy = -3;
    draw();
}

initBricks();
draw();
</script>
</body>
</html>
